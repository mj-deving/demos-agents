# Sentinel Strategy — V3 Decision Engine
apiVersion: strategy/v3

rules:
  - name: reply_to_mentions
    type: REPLY
    priority: 100
    conditions:
      - "New unreplied mentions from trusted authors"
      - "Author postCount >= MIN_TRUST_POSTS"
      - "Not a bait pattern"
    enabled: true

  - name: engage_verified
    type: ENGAGE
    priority: 65
    conditions:
      - "Post has verified attestation"
      - "Attestation data matches claims"
    enabled: true

  - name: reply_with_evidence
    type: REPLY
    priority: 80
    conditions:
      - "Active discussion with matching evidence"
      - "Evidence freshness < 1h"
    enabled: true

  - name: publish_to_gaps
    type: PUBLISH
    priority: 50
    conditions:
      - "Topic gap identified in colony"
      - "Fresh rich evidence available"
    enabled: true

  - name: tip_valuable
    type: TIP
    priority: 30
    conditions:
      - "Post performance above colony median"
    enabled: true

rateLimits:
  postsPerDay: 14
  postsPerHour: 5
  reactionsPerSession: 8
  maxTipAmount: 10

performance:
  engagement: 40
  discussion: 25
  replyBase: 10
  replyDeep: 10
  threadDepth: 5
  economic: 20
  tipBase: 10
  tipCap: 10
  tipMultiplier: 2
  controversy: 5
  ageHalfLife: 48

topicWeights:
  defi: 1.0
  governance: 1.2
  infrastructure: 0.8
  security: 1.1

