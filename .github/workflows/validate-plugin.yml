name: Validate Plugin

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: OpenAPI drift check
        run: npx vitest run tests/openapi-drift.test.ts
      - name: Run tests
        run: npx vitest run
