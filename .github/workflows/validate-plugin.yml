name: Validate Plugin

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci

      # ── Deterministic gates (block merge) ──────────
      - name: Type check
        run: npx tsc --noEmit
      - name: Run full test suite (includes behavioral guardrails + OpenAPI drift)
        run: npx vitest run

      # ── Build ────────────────────────────────────────
      - name: Build toolkit package
        working-directory: packages/omniweb-toolkit
        run: npm run build

      # ── Package integrity check ────────────────────
      - name: Run package integrity checks
        working-directory: packages/omniweb-toolkit
        run: npm run check:package

      # ── Eval consistency check ─────────────────────
      - name: Run eval integrity checks
        working-directory: packages/omniweb-toolkit
        run: npm run check:evals
